name: Build and Deploy to Azure VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push API image
        run: |
            docker build -f ./api/Dockerfile.prod -t ${{ vars.DOCKER_HUB_USERNAME }}/check-ministry-api:latest ./api
            docker push ${{ vars.DOCKER_HUB_USERNAME }}/check-ministry-api:latest

      - name: Build and push Web image
        run: |
            docker build -f ./web/Dockerfile.prod -t ${{ vars.DOCKER_HUB_USERNAME }}/check-ministry-web:latest ./web
            docker push ${{ vars.DOCKER_HUB_USERNAME }}/check-ministry-web:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check VM is available
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            df -h

      - name: Copy files to Azure VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          source: "."
          target: "/home/${{ secrets.AZURE_VM_USERNAME }}/${{ vars.REPO_DIRECTORY }}"

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.AZURE_VM_USERNAME }}/${{ vars.REPO_DIRECTORY }}

            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ vars.DOCKER_HUB_USERNAME }}" --password-stdin

            docker-compose -f docker-compose.prod.yml down || true

            docker pull ${{ vars.DOCKER_HUB_USERNAME }}/check-ministry-api:latest
            docker pull ${{ vars.DOCKER_HUB_USERNAME }}/check-ministry-web:latest

            POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            POSTGRES_DB=${{ secrets.POSTGRES_DB }} \
            docker-compose -f docker-compose.prod.yml up -d